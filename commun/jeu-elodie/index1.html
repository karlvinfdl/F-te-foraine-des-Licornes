<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Coaster Licorne</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="game-page">
    <canvas id="game"></canvas>

    <!-- HUD specs : vertical lignes, horizontal icônes/labels -->
    <div class="pixel-hud">
        <div class="hud-header">
            <div class="mini-logo" style="background-image: url('assets/images/licornee.png'); background-size: cover;"></div>
            <div class="elements-column">
                <div class="level-row">
                    <span>NIVEAU</span>
                    <span id="level-display">1</span>
                </div>
                <div class="hud-row">
                    <span>VIES</span>
                    <div class="hearts-row">
                        <img id="h1" src="assets/images/heart1.png" alt="">
                        <img id="h2" src="assets/images/heart2.png" alt="">
                        <img id="h3" src="assets/images/heart3.png" alt="">
                    </div>
                </div>
                <div class="hud-row">
                    <span>STARS</span>
                    <div class="stars-row">☆ ☆ ☆ ☆</div>
                </div>
                <div class="hud-row">
                    <span>PIÈCES</span>
                    <span id="coins-count">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Level Complete -->
    <div id="level-complete-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 200;">

        <div id="level-title" style="font-size: 60px; color: #2ecc71;">NIVEAU TERMINÉ !</div>
        <button class="next-btn" onclick="nextLevel()">NIVEAU SUIVANT</button>
    </div>

    <!-- End Screen -->
    <div id="end-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 200;">
        <div id="end-title" style="font-size: 80px; color: #e74c3c;">GAME OVER</div>
        <img id="end-img" src="assets/images/licornedcd.png" style="width: 200px;">
        <div class="button-row" style="display: flex; gap: 20px; margin-top: 20px;">
            <button class="restart-btn" onclick="restartGame()">REJOUER</button>
            <button class="menu-btn" onclick="goToParty()">RETOUR A LA FETE</button>
        </div>
    </div>

    <script src="assets/game.js"></script>
</body>
</html>
