<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roue - Loto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-wheel page-wheel3">

 <div class="scene" id="scene">
  <!-- class pour les roues -->
  <div class="game" id="wheelZone">
<div class="arrow" aria-hidden="true">
      <svg viewBox="0 0 50 40" xmlns="http://www.w3.org/2000/svg">
        <!-- Flèche pointing vers le bas -->
        <path d="M25 40 L0 10 L12 10 L12 0 L38 0 L38 10 L50 10 Z" 
              fill="#fff" 
              stroke="#0b3a44" 
              stroke-width="2"
              stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="wheel-wrap">
      <svg id="wheel" viewBox="0 0 200 200" role="img" aria-label="Roue de jeu">
        <g id="segments"></g>x

        <circle cx="100" cy="100" r="78" fill="none" stroke="none" stroke-width="0" />
        <circle cx="100" cy="100" r="48" fill="#ffffff" />
        <text x="100" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3a44">
          QUESTION /
        </text>
        <text x="100" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3a44">
          RÉPONSE
        </text>
      </svg>
    </div>

    <button id="spin" class="spin">JOUER</button>
    <div id="result" class="result" aria-live="polite"></div>
  </div>

  <!-- panel donc pop up -->
  <aside class="panel" id="panel" aria-hidden="true">
    <div class="hearts" aria-hidden="false"></div>
    <h2>Logique</h2>
    <div class="panel-card">Question 1</div>
    <div class="panel-card"></div>
    <div class="panel-card"></div>
  </aside>
</div>


  <script src="script.js"></script>
</body>
</html>
