<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roue - Suite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-wheel page-wheel2">

 <!-- Contrôle du volume (en haut à droite) -->
 <div id="volumeControl" style="position:fixed; top:15px; right:15px; z-index:1000; background:rgba(255,255,255,0.9); padding:10px 15px; border-radius:25px; display:flex; align-items:center; gap:10px; box-shadow:0 4px 15px rgba(0,0,0,0.2);">
   <span style="font-size:20px;">🎵</span>
   <input type="range" id="volumeSlider" min="0" max="100" value="70" style="width:80px; cursor:pointer;">
   <span id="volumeValue" style="font-size:12px; font-weight:bold; min-width:30px;">70%</span>
 </div>

 <div class="scene" id="scene">
<!-- Lecteur vinyle (visible au départ) -->
  <div class="vinyle-player" id="vinylePlayer">
    <img src="img/lecvinyle.svg" alt="Lecteur vinyle" />
  </div>

  <!-- Audio pour le blind test -->
  <audio id="blindTestAudio" preload="auto">
    <source src="sound/despacito.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="shapeOfYouAudio" preload="auto">
    <source src="sound/shapeofyou.mp3" type="audio/mpeg">
  </audio>

  <!-- class pour les roues -->
  <div class="game" id="wheelZone">
<div class="arrow" aria-hidden="true">
      <svg viewBox="0 0 50 40" xmlns="http://www.w3.org/2000/svg">
        <!-- Flèche pointing vers le bas -->
        <path d="M25 40 L0 10 L12 10 L12 0 L38 0 L38 10 L50 10 Z" 
              fill="#fff" 
              stroke="#0b3a44" 
              stroke-width="2"
              stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="wheel-wrap">
      <svg id="wheel" viewBox="0 0 200 200" role="img" aria-label="Roue de jeu">
        <g id="segments"></g>

        <circle cx="100" cy="100" r="78" fill="none" stroke="none" stroke-width="0" />
        <circle cx="100" cy="100" r="48" fill="#ffffff" />
        <text x="100" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3a44">
          QUESTION /
        </text>
        <text x="100" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3a44">
          RÉPONSE
        </text>
      </svg>
    </div>

    <button id="spin" class="spin">JOUER</button>
    <div id="result" class="result" aria-live="polite"></div>
  </div>

  <!-- panel donc pop up -->
  <aside class="panel" id="panel" aria-hidden="true">
    <div class="hearts" aria-hidden="false"></div>
    <h2>Blind Test</h2>
    <!-- Zone de phase de jeu -->
    <div id="blindTestPhase" class="panel-card">
      <div id="blindTestTimer">⏱️ 10s</div>
      <div id="blindTestQuestion">Devine le titre !</div>
    </div>
    <div class="panel-card">Question 1</div>
    <div class="panel-card"></div>
    <div class="panel-card"></div>
  </aside>
</div>


  <script src="script.js"></script>
</body>
</html>
