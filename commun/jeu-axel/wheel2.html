<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blind Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-wheel page-wheel2">

 <div class="scene" id="scene">
<!-- Lecteur vinyle (visible au départ) -->
  <div class="vinyle-player" id="vinylePlayer">
    <img src="img/lecvinyle.svg" alt="Lecteur vinyle" />
  </div>

  <!-- Audio pour le son de spin (effet sonore quand on clique sur JOUER) -->
  <audio id="spinSound" preload="auto">
    <source src="sound/LUCKY WHEEL SPIN SOUND EFFECTS  Copyright Free.mp3" type="audio/mpeg">
  </audio>

<!-- Audio pour le blind test -->
  <audio id="blindTestAudio" preload="auto">
    <source src="sound/despacito.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="shapeOfYouAudio" preload="auto">
    <source src="sound/shapeofyou.mp3" type="audio/mpeg">
  </audio>
  
<audio id="papaOutaiAudio" preload="auto">
    <source src="sound/papaoutai.mp3" type="audio/mpeg">
  </audio>
  
<audio id="billieJeanAudio" preload="auto">
    <source src="sound/billiejean.mp3" type="audio/mpeg">
  </audio>
  
<audio id="weWillRockAudio" preload="auto">
    <source src="sound/wewillrock.mp3" type="audio/mpeg">
  </audio>
  
<audio id="daftPunkAudio" preload="auto">
    <source src="sound/daftpunk.mp3" type="audio/mpeg">
  </audio>

  <!-- Audio supplémentaires pour blind test -->
  <audio id="brunoMarsAudio" preload="auto">
    <source src="sound/brunomars.mp3" type="audio/mpeg">
  </audio>
  <audio id="macarenaAudio" preload="auto">
    <source src="sound/macarena.mp3" type="audio/mpeg">
  </audio>
  <audio id="queenAudio" preload="auto">
    <source src="sound/queen.mp3" type="audio/mpeg">
  </audio>

  <!-- Contrôle du volume -->
  <div class="volume-control">
    <label for="volumeSlider">🔊 Volume</label>
    <input type="range" id="volumeSlider" min="0" max="100" value="50">
    <span id="volumeValue">50%</span>
  </div>

  <!-- class pour les roues -->
  <div class="game" id="wheelZone">

<div class="arrow" aria-hidden="true">
      <svg viewBox="0 0 50 40" xmlns="http://www.w3.org/2000/svg">
        <!-- Flèche pointing vers le bas -->
        <path d="M25 40 L0 10 L12 10 L12 0 L38 0 L38 10 L50 10 Z" 
              fill="#fff" 
              stroke="#0b3a44" 
              stroke-width="2"
              stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="wheel-wrap">
      <svg id="wheel" viewBox="0 0 200 200" role="img" aria-label="Roue de jeu">
<g id="segments"><path d="M 100 100 L 100 8 A 92 92 0 0 1 187.49719949915414 71.57043651750485 Z" fill="#000000" stroke="#ffffff" stroke-width="3"></path><text x="139.96939715588817" y="44.98684438250358" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="800" fill="#ffffff" transform="rotate(36 139.96939715588817 44.98684438250358)">1</text><path d="M 100 100 L 187.49719949915414 71.57043651750485 A 92 92 0 0 1 154.07624321090753 174.42956348249515 Z" fill="#1a1a1a" stroke="#ffffff" stroke-width="3"></path><text x="164.67184310807045" y="121.01315561749642" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="800" fill="#ffffff" transform="rotate(108 164.67184310807045 121.01315561749642)">2</text><path d="M 100 100 L 154.07624321090753 174.42956348249515 A 92 92 0 0 1 45.92375678909248 174.42956348249515 Z" fill="#2d2d2d" stroke="#ffffff" stroke-width="3"></path><text x="100" y="168" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="800" fill="#ffffff" transform="rotate(180 100 168)">3</text><path d="M 100 100 L 45.92375678909248 174.42956348249515 A 92 92 0 0 1 12.50280050084588 71.57043651750482 Z" fill="#404040" stroke="#ffffff" stroke-width="3"></path><text x="35.32815689192957" y="121.01315561749644" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="800" fill="#ffffff" transform="rotate(252 35.32815689192957 121.01315561749644)">4</text><path d="M 100 100 L 12.50280050084588 71.57043651750482 A 92 92 0 0 1 99.99999999999999 8 Z" fill="#000000" stroke="#ffffff" stroke-width="3"></path><text x="60.03060284411182" y="44.986844382503584" text-anchor="middle" dominant-baseline="middle" font-size="9" font-weight="800" fill="#ffffff" transform="rotate(324 60.03060284411182 44.986844382503584)">5</text></g>

        <circle cx="100" cy="100" r="78" fill="none" stroke="none" stroke-width="0" />
        <circle cx="100" cy="100" r="48" fill="#ffffff" />
        <text x="100" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3a44">
          BLIND
        </text>
        <text x="100" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0b3a44">
          TEST
        </text>
      </svg>
    </div>

    <button id="spin" class="spin">JOUER</button>
  </div>

  <!-- panel donc pop up -->
  <aside class="panel" id="panel" aria-hidden="true">
    <div class="hearts" aria-hidden="false"></div>
    <h2>Blind Test</h2>
<!-- Zone de phase de jeu -->
    <div id="blindTestPhase" class="panel-card">
      <div class="timer-container">
        <div id="blindTestTimer" class="timer-bar"></div>
      </div>
      <div id="blindTestQuestion">Devine le titre !</div>
    </div>
    <div class="panel-card">Question 1</div>
    <div class="panel-card"></div>
    <div class="panel-card"></div>
  </aside>
</div>


  <script src="script.js"></script>
</body>
</html>
