<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="page-card" style="background: url('img/background.jpg') center/cover fixed; min-height: 100vh; margin: 0;">

  <div class="ach-container" style="display: flex; justify-content: center; gap: 60px; flex-wrap: wrap; max-width: 900px; margin: 40px auto; padding: 40px;">
    
    <!-- Badges côte à côte -->
    <div style="text-align: center; flex: 1; min-width: 280px;">
      <h2 style="color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px;">🌀 Roue 1</h2>
      <div class="ach-grid" style="gap: 15px; justify-content: center;">
    
    <!-- SECTION WHEEL 1 -->
    <div style="text-align: center;">
      <h2 style="color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px;">🌀 Roue 1</h2>
      <div class="ach-grid" style="gap: 20px;">
        <div class="ach-card wheel1-bronze" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgebronzeavant.png" alt="Bronze Roue 1"></div>
            <div class="ach-face ach-back"><img src="img/badgebronzearriere.png" alt="Bronze Roue 1 verso"></div>
          </div>
        </div>
        <div class="ach-card wheel1-argent" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgeargavant.png" alt="Argent Roue 1"></div>
            <div class="ach-face ach-back"><img src="img/badgeargarriere.png" alt="Argent Roue 1 verso"></div>
          </div>
        </div>
        <div class="ach-card wheel1-diamant" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgediamavant.png" alt="Diamant Roue 1"></div>
            <div class="ach-face ach-back"><img src="img/badgediamantarr.png" alt="Diamant Roue 1 verso"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- SECTION WHEEL 2 -->
    <div style="text-align: center;">
      <h2 style="color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px;">🎵 Roue 2 (Blind Test)</h2>
      <div class="ach-grid" style="gap: 20px;">
        <div class="ach-card wheel2-bronze" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgebronzeavant.png" alt="Bronze Roue 2"></div>
            <div class="ach-face ach-back"><img src="img/badgebronzearriere.png" alt="Bronze Roue 2 verso"></div>
          </div>
        </div>
        <div class="ach-card wheel2-argent" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgeargavant.png" alt="Argent Roue 2"></div>
            <div class="ach-face ach-back"><img src="img/badgeargarriere.png" alt="Argent Roue 2 verso"></div>
          </div>
        </div>
        <div class="ach-card wheel2-diamant" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgediamavant.png" alt="Diamant Roue 2"></div>
            <div class="ach-face ach-back"><img src="img/badgediamantarr.png" alt="Diamant Roue 2 verso"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- SECTION WHEEL 3 -->
    <div style="text-align: center;">
      <h2 style="color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 20px;">⭐ Roue 3 (Stand)</h2>
      <div class="ach-grid" style="gap: 20px;">
        <div class="ach-card wheel3-bronze" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgebronzeavant.png" alt="Bronze Roue 3"></div>
            <div class="ach-face ach-back"><img src="img/badgebronzearriere.png" alt="Bronze Roue 3 verso"></div>
          </div>
        </div>
        <div class="ach-card wheel3-argent" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgeargavant.png" alt="Argent Roue 3"></div>
            <div class="ach-face ach-back"><img src="img/badgeargarriere.png" alt="Argent Roue 3 verso"></div>
          </div>
        </div>
        <div class="ach-card wheel3-diamant" style="width: 140px; height: 140px;">
          <div class="ach-flip">
            <div class="ach-face ach-front"><img src="img/badgediamavant.png" alt="Diamant Roue 3"></div>
            <div class="ach-face ach-back"><img src="img/badgediamantarr.png" alt="Diamant Roue 3 verso"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 3 Badges + Reset button -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Wheel badges
      const fautesWheel1 = parseInt(localStorage.getItem('fautesWheel1') || '0');
      showBadge('.wheel1-bronze', '.wheel1-argent', '.wheel1-diamant', fautesWheel1, 'Roue 1');
      
      const fautesWheel2 = parseInt(localStorage.getItem('fautesWheel2') || '0');
      showBadge('.wheel2-bronze', '.wheel2-argent', '.wheel2-diamant', fautesWheel2, 'Roue 2');
      
      const fautesWheel3 = parseInt(localStorage.getItem('fautesWheel3') || '0');
      showBadge('.wheel3-bronze', '.wheel3-argent', '.wheel3-diamant', fautesWheel3, 'Roue 3');
      
      function showBadge(bronzeSel, argentSel, diamSel, fautes, nomRoue) {
        const bronze = document.querySelector(bronzeSel);
        const argent = document.querySelector(argentSel);
        const diam = document.querySelector(diamSel);
        [bronze, argent, diam].forEach(card => card.style.display = 'none');
        
        if (fautes === 0 && diam) diam.style.display = 'block';
        else if (fautes === 1 && argent) argent.style.display = 'block';
        else if (fautes >= 2 && bronze) bronze.style.display = 'block';
        console.log(`${nomRoue}: ${fautes===0?'Diamant':fautes===1?'Argent':'Bronze ('+fautes+')'}`);
      }
      
      // Bouton Rejouer
      const resetBtn = document.createElement('button');
      resetBtn.textContent = '🔄 Rejouer';
      resetBtn.style.cssText = 'position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 40px; font-size: 20px; font-weight: bold; background: linear-gradient(135deg, #ff6b6b, #ee5a52); color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(255,107,107,0.4); transition: all 0.3s; z-index: 1000;';
      resetBtn.onclick = () => {
        if (confirm('Reset stats et rejouer?')) {
          localStorage.clear();
          location.href = 'index.html';
        }
      };
      resetBtn.onmouseover = () => resetBtn.style.transform = 'translateX(-50%) translateY(-3px) scale(1.05)';
      resetBtn.onmouseout = () => resetBtn.style.transform = 'translateX(-50%)';
      document.body.appendChild(resetBtn);
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
