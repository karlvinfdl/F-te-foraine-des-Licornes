<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>La roulette des licornes</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body class="intro">
  <!-- Audio element caché -->
  <audio id="wheelAudio" preload="auto">
    <source src="sound/LUCKY WHEEL SPIN SOUND EFFECTS  Copyright Free.mp3" type="audio/mpeg">
  </audio>
  
  <main class="intro-layer">
    <section class="wheels" aria-label="Choix du mode de jeu">
      <a class="wheel wheel--quest" href="#qr">
        <img src="img/questwheel.webp" alt="Question / Réponse">
      </a>

      <a class="wheel wheel--blind" href="#blind">
        <img src="img/blindwheel.webp" alt="Blind Test">
      </a>

      <a class="wheel wheel--stand" href="#stand">
        <img src="img/standwheel.webp" alt="Question Stand">
      </a>
    </section>

   <button type="button" class="play" onclick="playAudioDirect()">JOUER</button>
  </main>
  <script src="script.js"></script>
</body>


</html>
