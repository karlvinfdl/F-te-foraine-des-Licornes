<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Remerciements - Unicorn Shooter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="ending-game">

    <div class="credits-layout">
        <h1>Merci d’avoir joué !!</h1>

        <div class="score-final">
            <div class="rank-final" id="finalRank">?</div>
            <div class="final-score-text" id="finalScoreDisplay">Chargement...</div>
        </div>

        <div class="credits-box">
            <img src="../assets/images/Lakitu.png" class="credits-img" alt="Lakitu">
            <div class="credits-text" id="dynamicCreditsText">
                </div>
        </div>

        <div class="buttons">
            <button class="btn" id="btnRetry">Recommencer</button>
            <button class="btn" id="btnHome">Retour à l'accueil</button>
        </div>
    </div>

    <script src="../assets/js/thanks.js"></script>


<script>
    window.onload = () => {
    // 1. Récupération des données depuis le LocalStorage
    const lastScore = localStorage.getItem('lastFinalScore');
    const playerName = localStorage.getItem('lastPlayerName') || "Joueur";
    const leaderboard = JSON.parse(localStorage.getItem('unicornLeaderboard')) || [];
    
    // 2. Trouver le rang du joueur dans le classement global
    const rank = leaderboard.findIndex(e => e.score == lastScore && e.name == playerName) + 1;
    
    // 3. Mise à jour des éléments HTML
    document.getElementById('finalScoreDisplay').textContent = `${playerName} : ${lastScore}`;
    document.getElementById('finalRank').textContent = rank > 0 ? rank : "-";
    
    // 4. Personnalisation du message de Lakitu
    const creditsText = document.getElementById('dynamicCreditsText');
    let appreciation = "Pas mal du tout !";
    if (rank === 1) appreciation = "Tu es une véritable légende !";
    else if (rank <= 3) appreciation = "Le podium est à toi, bravo !";

    creditsText.innerHTML = `
        <p><strong>Bravo ${playerName} !</strong></p>
        <p>Tu termines à la ${rank}${rank === 1 ? 'er' : 'e'} place du top mondial avec un score de ${lastScore} points.</p>
        <p>${appreciation}</p>
    `;

    /* --- EXPLOSION DE CONFETTIS (CÔTÉS DROIT ET GAUCHE) --- */
const count = 150;
const defaults = {
    origin: { y: 0.7 },
    colors: ['#f5c2cf', '#ffffff', '#000000'], // Tes couleurs rose, blanc, noir
    particleCount: count / 2,
    spread: 70,
};

// Tir du côté GAUCHE
confetti({
    ...defaults,
    angle: 60,
    origin: { x: 0, y: 0.7 } // x: 0 = tout à gauche
});

// Tir du côté DROIT
confetti({
    ...defaults,
    angle: 120,
    origin: { x: 1, y: 0.7 } // x: 1 = tout à droite
});

    // 6. Navigation des boutons
    document.getElementById('btnRetry').onclick = () => window.location.href = "jeu.html";
    document.getElementById('btnHome').onclick = () => window.location.href = "../index.html";
};
</script>
</body>
</html>
