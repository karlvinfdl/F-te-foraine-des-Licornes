<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Remerciements - Unicorn Shooter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="shortcut icon" href="../assets/images/Lakitu.Favicon.png"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="ending-game">

    <div class="credits-layout">
        <h1>Merci d’avoir joué !!</h1>

        <div class="score-final">
            <div class="rank-final" id="finalRank">?</div>
            <div class="final-score-text" id="finalScoreDisplay">Chargement...</div>
        </div>

        <div class="credits-box">
            <img src="../assets/images/Lakitu.png" class="credits-img" alt="Lakitu">
            <div class="credits-text" id="dynamicCreditsText">
                </div>
        </div>

        <div class="buttons">
            <button class="btn" id="btnRetry">Recommencer</button>
            <button class="btn" id="btnHome">Retour à l'accueil</button>
        </div>
    </div>

    <audio id="EndMusic" src="../assets/sounds/Credits_Music.mp3" loop></audio>


<script>
    window.onload = () => {
        // --- GESTION DE LA MUSIQUE DE FIN ---
        const endMusic = document.getElementById('EndMusic');
        if (endMusic) {
            endMusic.volume = 0; // On commence à zéro
            endMusic.play().then(() => {
                // Petit fondu pour une entrée élégante
                let fade = setInterval(() => {
                    if (endMusic.volume < 0.9) {
                        endMusic.volume += 0.05;
                    } else {
                        endMusic.volume = 1;
                        clearInterval(fade);
                    }
                }, 100);
            }).catch(e => {
                console.log("Lecture automatique bloquée par le navigateur, clic requis.");
            });
        }

        // 1. Récupération des données depuis le LocalStorage
        const lastScore = localStorage.getItem('lastFinalScore') || 0;
        const playerName = localStorage.getItem('lastPlayerName') || "Joueur";
        const leaderboard = JSON.parse(localStorage.getItem('unicornLeaderboard')) || [];
        
        // 2. Trouver le rang du joueur dans le classement global
        const rank = leaderboard.findIndex(e => e.score == lastScore && e.name == playerName) + 1;
        
        // 3. Mise à jour des éléments HTML
        document.getElementById('finalScoreDisplay').textContent = `${playerName} : ${lastScore}`;
        document.getElementById('finalRank').textContent = rank > 0 ? rank : "-";
        
        // 4. Personnalisation du message de Lakitu
        const creditsText = document.getElementById('dynamicCreditsText');
        let appreciation = "Pas mal du tout !";
        if (rank === 1) appreciation = "Tu es une véritable légende !";
        else if (rank <= 3) appreciation = "Le podium est à toi, bravo !";

        creditsText.innerHTML = `
            <p><strong>Bravo ${playerName} !</strong></p>
            <p>Tu termines à la ${rank}${rank === 1 ? 'er' : 'e'} place du top mondial avec un score de ${lastScore} points.</p>
            <p>${appreciation}</p>
        `;

        // 5. EXPLOSION DE CONFETTIS (CÔTÉS DROIT ET GAUCHE)
        const count = 150;
        const defaults = {
            origin: { y: 0.7 },
            colors: ['#f5c2cf', '#ffffff', '#000000'], 
            particleCount: count / 2,
            spread: 70,
        };

        confetti({
            ...defaults,
            angle: 60,
            origin: { x: 0, y: 0.7 } 
        });

        confetti({
            ...defaults,
            angle: 120,
            origin: { x: 1, y: 0.7 } 
        });

        // 6. Navigation des boutons avec Fade Out musical
        const fadeOutAndRedirect = (url) => {
            if (endMusic) {
                let fadeOut = setInterval(() => {
                    if (endMusic.volume > 0.1) {
                        endMusic.volume -= 0.1;
                    } else {
                        clearInterval(fadeOut);
                        window.location.href = url;
                    }
                }, 50);
            } else {
                window.location.href = url;
            }
        };

        document.getElementById('btnRetry').onclick = () => fadeOutAndRedirect("jeu.html");
        document.getElementById('btnHome').onclick = () => fadeOutAndRedirect("../index.html");
    };
</script>
</body>
</html>
