<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Classement - Unicorn Shooter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="score-board">
    <h1 class="title">SCORES TOTAUX :</h1>

    <div class="score-list" id="scoreList">
        </div>

    <div class="click-to-continue" id="btnContinue">
        <span class="flashing-text">CLIQUER POUR CONTINUER</span>
    </div>

    <script>
        window.onload = () => {
            const leaderboard = JSON.parse(localStorage.getItem('unicornLeaderboard')) || [];
            const lastScore = localStorage.getItem('lastFinalScore');
            const lastName = localStorage.getItem('lastPlayerName');

            const scoreContainer = document.getElementById('scoreList');
            scoreContainer.innerHTML = ""; 

            leaderboard.forEach((entry, index) => {
                const isSameName = entry.name.trim().toUpperCase() === lastName?.trim().toUpperCase();
                const isSameScore = Number(entry.score) === Number(lastScore);
                const isCurrentPlayer = isSameName && isSameScore;

                const itemClass = isCurrentPlayer ? "score-item current-player" : "score-item";

                scoreContainer.innerHTML += `
                    <div class="${itemClass}">
                        <div class="rank">${index + 1}</div>
                        <div class="score-bar">
                            <span class="name">${entry.name} ${isCurrentPlayer ? "(MOI)" : ""}</span>
                            <span class="value">: ${entry.score}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('btnContinue').onclick = () => {
                window.location.href = "remerciments.html";
            };
        };
    </script>
</body>
</html>
