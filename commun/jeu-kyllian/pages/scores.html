<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Classement - Unicorn Shooter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="shortcut icon" href="../assets/images/Lakitu.Favicon.png"/>
</head>

<body class="score-board">
    <h1 class="title">SCORES TOTAUX :</h1>

    <div class="score-list" id="scoreList">
        </div>

    <div class="tap-to-continue" id="btnContinue">
        <span class="flashing-text">APPUYER SUR ESPACE OU ENTRER POUR CONTINUER</span>
    </div>

 <audio id="scoreMusic" src="../assets/sounds/S_Scores.mp3" preload="auto"></audio>

   <script>
    window.onload = () => {
    // 1. Lancement du son
    const scoreMusic = document.getElementById('scoreMusic');
    if (scoreMusic) {
        scoreMusic.volume = 0.5; 
        scoreMusic.play().catch(e => {
            console.log("Lecture auto bloquée");
        });
    }

    // 2. Récupération des données
    let leaderboard = JSON.parse(localStorage.getItem('unicornLeaderboard')) || [];
    const lastScore = localStorage.getItem('lastFinalScore');
    const lastName = localStorage.getItem('lastPlayerName');

    // --- LOGIQUE DE MISE À JOUR ---
    // On vérifie si le joueur actuel n'est pas déjà dans le leaderboard pour éviter les doublons au rafraîchissement
    if (lastName && lastScore) {
        const alreadyExists = leaderboard.some(entry => 
            entry.name === lastName && entry.score === parseInt(lastScore)
        );

        if (!alreadyExists) {
            leaderboard.push({ name: lastName, score: parseInt(lastScore) });
            leaderboard.sort((a, b) => b.score - a.score);
            // On ne garde que les 15 meilleurs
            leaderboard = leaderboard.slice(0, 15);
            localStorage.setItem('unicornLeaderboard', JSON.stringify(leaderboard));
        }
        // IMPORTANT : On NE SUPPRIME PAS lastFinalScore ici sinon la page remerciements buggera.
    }

    const scoreContainer = document.getElementById('scoreList');
    scoreContainer.innerHTML = ""; 

    // 3. Affichage du classement (Limité aux 15 premiers)
    leaderboard.forEach((entry, index) => {
        const isSameName = entry.name.trim().toUpperCase() === lastName?.trim().toUpperCase();
        const isSameScore = Number(entry.score) === Number(lastScore);
        const isCurrentPlayer = isSameName && isSameScore;

        const itemClass = isCurrentPlayer ? "score-item current-player" : "score-item";

        scoreContainer.innerHTML += `
            <div class="${itemClass}">
                <div class="rank">${index + 1}</div>
                <div class="score-bar">
                    <span class="name">${entry.name} ${isCurrentPlayer ? "(MOI)" : ""}</span>
                    <span class="value">: ${entry.score}</span>
                </div>
            </div>
        `;
    });

    // 4. Fonction pour passer à la page suivante
    const goToNextPage = () => {
        window.location.href = "remerciments.html";
    };

    const btnContinue = document.getElementById('btnContinue');
    if (btnContinue) {
        btnContinue.onclick = goToNextPage;
    }

    // 5. Gestion du clavier (Entrée ou Espace)
    window.addEventListener('keydown', (e) => {
        if (e.code === "Enter" || e.code === "Space") {
            e.preventDefault();
            goToNextPage();
        }
    });
};
</script>
</body>
</html>
