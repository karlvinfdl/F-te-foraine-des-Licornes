<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Tir - Licornes</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="shortcut icon" href="../assets/images/Lakitu.Favicon.png"/>
</head>

<body class="world_1"> <div id="levelContainer"></div>
 
    <!-- OVERLAY D'ENTREE DU JEU -->
   <div id="welcomeOverlay" class="welcome-overlay">
    <div class="welcome-content">
        <img src="../assets/images/Logo_Pinata.png" alt="Licorne Shooter" class="welcome-logo">
        
        <div class="input-container">
            <input type="text" id="playerNameInput" placeholder="TON PSEUDO" maxlength="12">
            <button id="startGameBtn">JOUER</button>
        </div>
    </div>
</div>

     <!-- MESSAGE DE DECOMPTE -->
    <div id="startMessage" class="start-message">Prêt(e) ?</div>

    
    <!-- STRUCTURE DU NIVEAU -->
    <header class="game-infos">
        <div class="score">
            <img src="../assets/images/licorne_1.png">
            <p id="scoreValue">0</p>
        </div>
        <div class="timer" id="timerValue">1:00</div>
    </header>

    <div class="current-level">Level 1</div>

    <div class="pause">
        <button class="btn-pause" id="pauseBtn">⏸</button>
    </div>

   

<!-- OVERLAY DE FIN DE NIVEAU -->
<div id="endOverlay" class="end-overlay">
    <h1 class="end-title">FINI !!!!</h1>
    
    <div class="end-content">
        <div class="end-score-box">
            Score : <span id="finalScore">0</span>
        </div>
        <p class="end-comment" id="endComment">Pas ouf...</p>
    </div>

    <div class="click-to-continue">Appuyer sur Entree ou Espace pour continuer</div>
</div>

<!-- SECTION PAUSE -->
<div id="pauseOverlay" class="pause-overlay">
    <div class="pause-content">
        <h2 class="pause-title">PAUSE</h2>
        <div class="pause-buttons">
            <button id="resumeBtn" class="btn-pause-menu">REPRENDRE</button>
            <button id="settingsBtn" class="btn-pause-menu">RÉGLAGES</button>
            <button id="quitBtn" class="btn-pause-menu btn-quit">QUITTER</button>
        </div>
    </div>
</div>

<!-- SECTION CONFIRMATION -->
<div id="confirmOverlay" class="custom-overlay" style="display:none;">
    <div class="confirm-box">
        <p>QUITTER ?</p>
        <div class="confirm-buttons">
            <button id="confirmYes">OUI</button>
            <button id="confirmNo">ANNULER</button>
        </div>
    </div>
</div>


<!-- OVERLAY REGLAGES -->
<div id="settingsOverlay" class="modal-overlay">
    <div class="modal-content settings-box">
        <h2 class="pause-title" style="color: #000; margin-bottom: 20px;">RÉGLAGES</h2>
        
        <div class="setting-item">
            <label>Musique</label>
            <input type="range" id="musicVolume" min="0" max="1" step="0.1" value="0.5">
        </div>

        <div class="setting-item">
            <label>Bruitages</label>
            <input type="range" id="sfxVolume" min="0" max="1" step="0.1" value="0.7">
        </div>

        <button id="closeSettingsBtn" class="btn-pause-menu" style="margin-top: 20px;">OK</button>
    </div>
</div>



<!-- MESSAGE DE REPRISE DU JEU -->
<div id="startMessage" class="restart-countdown"></div>

     <!-- AUDIOS LEVELS -->
      <audio id="lvlMusicOne" src="../assets/sounds/Level_1.mp3" loop></audio>
      <audio id="lvlMusicTwo" src="../assets/sounds/OOZone.mp3" loop></audio>
      <audio id="lvlMusicThree" src="../assets/sounds/Level_2.mp3" loop></audio>
      <audio id="endLevelSound" src="../assets/sounds/Lvl_End.mp3" preload="auto"></audio>
      <audio id="countDownSound" src="../assets/sounds/Countdown.mp3" preload="auto"></audio>
      <audio id="resumeSound" src="../assets/sounds/Resume.mp3"></audio>
      <audio id="timerBeepSound" src="../assets/sounds/Countdown-End.mp3" preload="auto"></audio>

      <!-- AUDIOS TIRS -->
      <audio id="popSound" src="../assets/sounds/Shooting.mp3" preload="auto"></audio>
      <audio id="popSoundTwo" src="../assets/sounds/Shooting_2.mp3" preload="auto"></audio>
      
     
      <!-- AUDIOS ITEMS -->
      <audio id="lakituSaveSound" src="../assets/sounds/Lakitu.mp3" preload="auto"></audio>
      <audio id="lakituHitSound" src="../assets/sounds/laki_bump.mp3" preload="auto"></audio>
      <audio id="boshiSound" src="../assets/sounds/hoo.mp3"></audio>
      <audio id="lakituEvilSound" src="../assets/sounds/Boo.mp3" preload="auto"></audio>
      <audio id="evilPopSound" src="../assets/sounds/Yami.mp3"></audio>
      <audio id="ufoSound" src="../assets/sounds/OVNI.mp3"></audio>
      <audio id="dogBarkSound" src="../assets/sounds/Tokyo.mp3" preload="auto"></audio>
      <audio id="bombSound" src="../assets/sounds/Bomb.mp3" preload="auto"></audio>
      
      <audio id="starSound" src="../assets/sounds/weeeee.mp3"></audio>
      <audio id="guhaSound" src="../assets/sounds/guha.mp3"></audio>
    
      <!-- SCRIPT -->
      <script src="../assets/js/script.js"></script>
</body>
</html>
