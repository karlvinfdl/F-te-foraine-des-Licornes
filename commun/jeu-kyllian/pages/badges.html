<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Piñata - Badges en construction</title>
    <link rel="shortcut icon" href="../assets/images/Evil_Lakitu.png"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #474747;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Correction du background animé */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../assets/images/EL_404.gif');
            background-repeat: repeat;
            background-size: 214px; /* Ajuste la taille des petits nuages ici */
            animation: cloudsMove 40s linear infinite;
            z-index: -1;
            opacity: 0.8; /* Optionnel : pour que les nuages soient un peu plus discrets */
        }

        @keyframes cloudsMove {
            from { background-position: 2000px 0; }
            to { background-position: 0 0; } /* Déplacement en diagonale pour plus de vie */
        }

        .content {
            margin-top: 8vh;
            text-align: center;
            z-index: 2;
        }

        .error-code {
            font-family: 'Press Start 2P', cursive;
            font-size: 100px;
            color: #ff0055;
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 30px;
        }

        .worker-icon {
            font-size: 90px;
            margin-bottom: 30px;
            display: block;
        }

        .pixel-text {
            font-family: 'Press Start 2P', cursive;
            color: #333;
            line-height: 1.8;
            font-size: 22px;
            margin-bottom: 80px;
            background: rgba(255, 255, 255, 0.7); /* Petit fond blanc semi-transparent pour la lisibilité */
            padding: 10px;
            border-radius: 5px;
            font-weight: bolder;
        }

        .black-bar {
            position: absolute;
            width: 100%;
            height: 100px;
            background-color: #000000;
            bottom: 15%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .circle-button {
            width: 170px;
            height: 170px;
            background-color: #bdbdbd;
            border: 8px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #000;
            font-weight: bolder;
            font-family: 'Arial', sans-serif;
            font-size: 22px;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
        }

        .circle-button:hover {
            transform: scale(1.05);
            background-color:#f5c2cf;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="error-code">404</div>
        <div class="worker-icon">🏗️</div>
        <div class="pixel-text">
            LES BADGES SONT<br>
            EN COURS DE<br>
            CONSTRUCTION !!
        </div>
    </div>

    <div class="black-bar">
        <a href="../index.html" class="circle-button">RETOUR</a>
    </div>

</body>
</html>
